name: CI/CD - cicd-basic-lab to mylab-bastion

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cicd-basic-lab
    outputs:
      artifact_name: ${{ steps.set-name.outputs.value }}
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven 빌드
        run: mvn -B package -DskipTests

      - name: JAR 파일명 정리
        run: mv ./target/*.jar ./target/app.jar

      - name: Artifact 이름 설정
        id: set-name
        run: echo "value=app-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: JAR Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-name.outputs.value }}
          path: ./cicd-basic-lab/target/app.jar
          retention-days: 1

  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: JAR Artifact 다운로드
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.ci.outputs.artifact_name }}
          path: .

      - name: SCP로 EC2에 JAR 전송
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "app.jar"
          target: "/home/ubuntu/app"

      - name: SSH로 EC2에서 앱 실행
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          script: |
            mkdir -p /home/ubuntu/app/deploy
            mv /home/ubuntu/app/app.jar /home/ubuntu/app/deploy/app.jar
            sudo fuser -k -n tcp 8080 || true
            cd /home/ubuntu/app/deploy
            nohup java -jar app.jar > ./output.log 2>&1 &
            sleep 3
            echo "앱 실행 완료"
